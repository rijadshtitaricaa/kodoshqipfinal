        // --- FUNKSIONET KRYESORE ---

        function displayLesson(lessonIndex, previousPrompt = null) {
            const outputDiv = document.getElementById('lesson-output');
            const topicDisplay = document.getElementById('current-topic-display');
            
            const totalLessons = lessons.length;
            const isFinished = lessonIndex >= totalLessons;

            if (isFinished) {
                lessonIndex = totalLessons - 1; 
                document.getElementById('send-button').textContent = "Rinis Kursin";
                document.getElementById('send-button').classList.remove('bg-blue-600', 'hover:bg-blue-700');
                document.getElementById('send-button').classList.add('bg-green-600', 'hover:bg-green-700');
            } else {
                document.getElementById('send-button').textContent = "Vazhdo";
                document.getElementById('send-button').classList.remove('bg-green-600', 'hover:bg-green-700');
                document.getElementById('send-button').classList.add('bg-blue-600', 'hover:bg-blue-700');
            }

            const lesson = lessons[lessonIndex];

            let conversationHtml = '';
            // Mos shfaq "Vazhdo" si përgjigje nëse përdoruesi thjesht shtypi Enter
            if (previousPrompt && previousPrompt !== 'Vazhdo') { 
                conversationHtml += `<div class="p-3 my-2 rounded-lg bg-blue-100 text-blue-900 border border-blue-200 shadow-sm">
                    <strong>Përgjigja Juaj:</strong> ${previousPrompt}
                </div>`;
            }

            const lessonContent = `
                ${conversationHtml}
                <div class="lesson-box p-6 mt-4 border border-blue-300 rounded-xl shadow-lg bg-white">
                    <h1 class="text-2xl font-bold text-blue-800">${lesson.title} (${lessonIndex + 1} / ${totalLessons})</h1>
                    <div class="mt-4 text-gray-700">
                        ${lesson.content}
                    </div>
                    ${isFinished ? `
                        <div class="mt-6 p-4 bg-green-900 border border-green-500 rounded-lg">
                            <p class="text-green-200 mb-4 font-semibold">🎉 Urime! Ju keni arritur në fund të kursit!</p>
                            <button id="complete-btn" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-6 rounded-lg transition duration-200">
                                ✅ Shënoni Kursin si të Përfunduar
                            </button>
                        </div>
                    ` : `<p class="mt-6 p-3 bg-indigo-50 text-indigo-700 rounded-lg font-semibold">
                        Sfidë: Shtypni "Vazhdo" ose Enter për të kaluar tek mësimi tjetër.
                    </p>`}
                </div>
            `;
            
            outputDiv.innerHTML = DOMPurify.sanitize(lessonContent);
            topicDisplay.textContent = lesson.title;
            
            // Add completion button handler
            if (isFinished) {
                setTimeout(() => {
                    const completeBtn = document.getElementById('complete-btn');
                    if (completeBtn) {
                        completeBtn.addEventListener('click', async () => {
                            completeBtn.disabled = true;
                            completeBtn.textContent = '⏳ Po ruhet...';
                            
                            if (typeof courseProgress !== 'undefined' && courseProgress) {
                                try {
                                    await courseProgress.saveCourseProgress('CSS', lessons.length, lessons.length, lessons.length * 10);
                                    completeBtn.textContent = '✅ Kursi u ruajt me sukses!';
                                    completeBtn.classList.remove('bg-green-500', 'hover:bg-green-600');
                                    completeBtn.classList.add('bg-green-700');
                                    console.log('✅ CSS course marked as completed!');
                                } catch (err) {
                                    console.error('Error saving progress:', err);
                                    completeBtn.textContent = '❌ Gabim në ruajtje';
                                    completeBtn.disabled = false;
                                }
                            }
                        });
                    }
                }, 100);
            }
            
            // Scroll në krye të përmbajtjes së mësimit të ri
            outputDiv.scrollIntoView({ behavior: 'smooth' });
        }

        function sendMessage() {
            const inputField = document.getElementById('user-input');
            const message = inputField.value.trim() || 'Vazhdo'; 
            inputField.value = '';

            let nextIndex = currentLessonIndex;

            if (nextIndex >= lessons.length) {
                // Save progress to database
                if (typeof courseProgress !== 'undefined' && courseProgress) {
                    courseProgress.saveCourseProgress('CSS', lessons.length, lessons.length, lessons.length * 10)
                        .then(() => {
                            console.log('✅ CSS course progress saved!');
                        })
                        .catch(err => console.error('Error saving progress:', err));
                }
                nextIndex = 0; // Rinis kursin në mësimin 1 (index 0)
                currentLessonIndex = 1; // Për mësimin pasardhës
            } else {
                currentLessonIndex++;
            }
            
            displayLesson(nextIndex, message);
        }

        window.onload = function() {
            // Shfaq statusin bazë
            document.getElementById('user-status').textContent = `Progresi ruhet vetëm për këtë seancë`;
            
            // Fshehim butonin e daljes/kontejnerin e auth
            const authButtonContainer = document.getElementById('auth-button-container');
            if (authButtonContainer) authButtonContainer.innerHTML = '';

            document.getElementById('main-content').classList.remove('hidden');

            // Shfaq mësimin e parë
            displayLesson(currentLessonIndex); 
            currentLessonIndex++; 

            // Lidhjet e Eventeve të Kursit
            document.getElementById('send-button').addEventListener('click', sendMessage);
            document.getElementById('user-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault(); 
                    sendMessage();
                }
            });
        };
    </script>
