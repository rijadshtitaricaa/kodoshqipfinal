<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krijuesit e Projektit</title>
    <style>
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #0d1b2a, #1b263b);
            color: #e0e1dd;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            text-align: center;
            letter-spacing: 1px;
            animation: fadeDown 1.2s ease forwards;
        }

        
        .dev-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            max-width: 900px;
            padding: 0 1rem;
        }

        .dev-card {
            background: #1e2a38;
            border-radius: 15px;
            width: 300px;
            text-align: center;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transform: translateY(30px);
            opacity: 0;
            animation: fadeUp 1s ease forwards;
        }

        .dev-card:nth-child(2) {
            animation-delay: 0.3s;
        }

        .dev-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #415a77;
            margin-bottom: 1rem;
        }

        .dev-name {
            font-size: 1.3rem;
            color: #e0e1dd;
            margin-bottom: 0.5rem;
        }

        .dev-role {
            font-size: 0.95rem;
            color: #a9bcd0;
            margin-bottom: 1rem;
        }

        .dev-links a {
            text-decoration: none;
            color: #778da9;
            font-weight: 500;
            transition: color 0.3s;
        }

        .dev-links a:hover {
            color: #fca311;
        }

        
        @keyframes fadeUp {
            0% {opacity: 0; transform: translateY(30px);}
            100% {opacity: 1; transform: translateY(0);}
        }

        @keyframes fadeDown {
            0% {opacity: 0; transform: translateY(-30px);}
            100% {opacity: 1; transform: translateY(0);}
        }

        
        @media (max-width: 700px) {
            h1 {
                font-size: 2rem;
            }
            .dev-card {
                width: 90%;
            }
        }

        
        .back-btn {
            margin-top: 2.5rem;
            color: #fca311;
            text-decoration: none;
            border: 1px solid #fca311;
            padding: 0.7rem 1.4rem;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: #fca311;
            color: #14213d;
        }
    </style>
</head>
<body>
    <h1>Krijuesit e Projektit</h1>

    <div class="dev-container">
        <div class="dev-card">
            <img src="IMG_5180.PNG" alt="Rijad" class="dev-img">
            <div class="dev-name">Rijad Shtitarica</div>
            <div class="dev-role">Full Stack Developer - Themelues Krijues i Uebfaqes</div>
            <div class="dev-links">
                <a href="https://www.instagram.com/rijad_sh02/">Instagram</a> • <a href="https://github.com/rijadshtitaricaa">GitHub</a>
            </div>
        </div>

        <div class="dev-card">
            <img src="IMG_2552.JPG" alt="Ardian" class="dev-img">
            <div class="dev-name">Etnik Haziri</div>
            <div class="dev-role">Full Stack Developer</div>
            <div class="dev-links">
                <a href="https://github.com/etnikhaziri">GitHub</a> • <a href="https://www.instagram.com/etn.ikk/#">Instagram</a>
            </div>
        </div>
    </div>

    <a href="index.html" class="back-btn">Kthehu në Faqen Kryesore</a>
</body>
</html>
