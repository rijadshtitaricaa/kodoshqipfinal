        function showLesson(index) {
            if (index < 0 || index >= lessons.length) {
                return;
            }

            currentLessonIndex = index;
            const lesson = lessons[index];

            lessonTitle.textContent = `${index + 1}. ${lesson.title.substring(lesson.title.indexOf('.') + 1).trim()}`; // Heq numërimin e dyfishtë
            let lessonHTML = lesson.content;
            
            if (index === lessons.length - 1) {
                lessonHTML += `
                    <div class="mt-8 p-4 bg-green-900 border border-green-500 rounded-lg">
                        <p class="text-green-200 mb-4 font-semibold">🎉 Urime! Ju keni arritur në fund të kursit!</p>
                        <button id="complete-btn" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-6 rounded-lg transition duration-200">
                            ✅ Shënoni Kursin si të Përfunduar
                        </button>
                    </div>
                `;
            }
            
            lessonContent.innerHTML = lessonHTML;

            prevBtn.disabled = index === 0;
            nextBtn.disabled = index === lessons.length - 1;

            lessonCounter.textContent = `${index + 1} / ${lessons.length}`;
            
            const progress = ((index + 1) / lessons.length) * 100;
            progressBar.style.width = `${progress}%`;

            if (index === lessons.length - 1) {
                setTimeout(() => {
                    const completeBtn = document.getElementById('complete-btn');
                    if (completeBtn) {
                        completeBtn.addEventListener('click', async () => {
                            completeBtn.disabled = true;
                            completeBtn.textContent = '⏳ Po ruhet...';
                            
                            if (typeof courseProgress !== 'undefined' && courseProgress) {
                                try {
                                    await courseProgress.saveCourseProgress('Django', lessons.length, lessons.length, lessons.length * 10);
                                    completeBtn.textContent = '✅ Kursi u ruajt me sukses!';
                                    completeBtn.classList.remove('bg-green-500', 'hover:bg-green-600');
                                    completeBtn.classList.add('bg-green-700');
                                    console.log('✅ Django course marked as completed!');
                                } catch (err) {
                                    console.error('Error saving progress:', err);
                                    completeBtn.textContent = '❌ Gabim në ruajtje';
                                    completeBtn.disabled = false;
                                }
                            }
                        });
                    }
                }, 100);
            }

            lessonContent.scrollTop = 0;
        }

        
        function nextLesson() {
            if (currentLessonIndex < lessons.length - 1) {
                showLesson(currentLessonIndex + 1);
            }
        }

        
        function prevLesson() {
            if (currentLessonIndex > 0) {
                showLesson(currentLessonIndex - 1);
            }
        }

        function runCode() {
            const code = document.getElementById('django-code').value;
            const output = document.getElementById('django-output');
            
            output.innerHTML = '<span class="text-yellow-400">Duke ekzekutuar Django/Python...</span>';
            
            // Përdorim Pyodide për ekzekutim të Python-it në browser
            try {
                // Shtimi i Pyodide nëse nuk ekziston
                if (typeof pyodide === 'undefined') {
                    const script = document.createElement('script');
                    script.src = 'https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js';
                    script.onload = function() {
                        executeDjango(code, output);
                    };
                    document.head.appendChild(script);
                } else {
                    executeDjango(code, output);
                }
            } catch (error) {
                output.innerHTML = `<span class="text-red-400">Gabim: ${error.message}</span>`;
            }
        }
        
        function executeDjango(code, output) {
            try {
                // Pastro output
                pyodide.runPythonAsync(code).then(results => {
                    if (results.length > 0) {
                        output.innerHTML = results[0].split('\n').map(line => 
                            `<span class="text-green-400">${escapeHtml(line)}</span>`
                        ).join('<br>');
                    } else {
                        output.innerHTML = '<span class="text-gray-400">Kodi u ekzekutua pa output</span>';
                    }
                }).catch(error => {
                    output.innerHTML = `<span class="text-red-400">Gabim në ekzekutim: ${error.message}</span>`;
                });
            } catch (error) {
                output.innerHTML = `<span class="text-red-400">Gabim: ${error.message}</span>`;
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function clearCode() {
            document.getElementById('django-code').value = '';
            document.getElementById('django-output').innerHTML = '<span class="text-gray-500">Përgatituni për të parë rezultatin...</span>';
        }

        window.onload = () => {
            window.nextLesson = nextLesson;
            window.prevLesson = prevLesson;

            showLesson(currentLessonIndex);
        }
        
    </script>
</body>
</html>
