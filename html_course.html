        // Nikiii JS pjesa
        let currentLessonIndex = 0;

        function displayLesson(lessonIndex, previousPrompt = null) {
            const outputDiv = document.getElementById('lesson-output');
            const topicDisplay = document.getElementById('current-topic-display');
            
            if (lessonIndex >= lessons.length) {
                currentLessonIndex = 0; 
                lessonIndex = 0;
            }

            const lesson = lessons[lessonIndex];

            let conversationHtml = '';
            if (previousPrompt) {
                conversationHtml += `<div class="p-3 my-2 rounded-lg bg-blue-100 text-blue-900 border border-blue-200 shadow-sm">
                    <strong>Ju:</strong> ${DOMPurify.sanitize(previousPrompt)}
                </div>`;
                conversationHtml += `<div class="p-3 my-2 rounded-lg bg-gray-100 text-gray-800 border border-gray-200 shadow-sm">
                    <strong>Mentori:</strong> Kalojmë tek mësimi tjetër...
                </div>`;
            } else {
                conversationHtml += `<div class="p-3 my-2 rounded-lg bg-gray-100 text-gray-800 border border-gray-200 shadow-sm">
                    <strong>Mirë se vini!</strong> Ky kurs statik i HTML-së ka ${lessons.length} mësime. Përdorni butonin 'Dërgo' ose shtypni 'Enter' për të kaluar tek mësimet.
                </div>`;
            }

            const lessonContent = `
                ${conversationHtml}
                <div class="lesson-box p-6 mt-4 border border-blue-300 rounded-xl shadow-lg bg-white">
                    <div class="flex justify-between items-center mb-4">
                        <h1 class="text-2xl font-bold text-blue-800">${lesson.title}</h1>
                        <a href="${lesson.videoLink}" target="_blank" class="text-white bg-red-600 hover:bg-red-700 py-2 px-4 rounded-full text-sm font-semibold shadow-md transition duration-200">
                            &lt;Lidhu me Video&gt;
                        </a>
                    </div>
                    ${lesson.content}
                    <p class="mt-6 p-3 bg-indigo-50 border border-indigo-200 text-indigo-700 rounded-lg font-semibold">
                        Sfidë: Për të kaluar tek mësimi tjetër (${(lessonIndex + 2 > lessons.length) ? 'Rinisja' : 'Mësimi ' + (lessonIndex + 2)}), shtypni sërish "Vazhdo" ose çfarëdo mesazhi.
                    </p>
                </div>
            `;
            
            outputDiv.innerHTML = lessonContent;
            topicDisplay.textContent = lesson.title;
        }

        function resetCourse() {
            currentLessonIndex = 0;
            displayLesson(currentLessonIndex, 'Kthimi në faqen kryesore (index.html)');
            currentLessonIndex++;
            window.scrollTo(0, 0);
        }

        
        function runCode() {
            const htmlCode = document.getElementById('html-code').value;
            const cssCode = document.getElementById('css-code').value;
            const preview = document.getElementById('preview');
            
            const sanitizedHtml = DOMPurify.sanitize(htmlCode);
            
            const combinedCode = `
                <!DOCTYPE html>
                <html lang="sq">
                <head>
                    <meta charset="UTF-8">
                    <title>Preview</title>
                    <style>
                        ${cssCode}
                    </style>
                </head>
                <body>
                    ${sanitizedHtml}
                </body>
                </html>
            `;
            
            const iframe = document.createElement('iframe');
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.style.border = 'none';
            iframe.srcdoc = combinedCode;
            
            preview.innerHTML = '';
            preview.appendChild(iframe);
        }
        
        function clearCode() {
            document.getElementById('html-code').value = '';
            document.getElementById('css-code').value = '';
            document.getElementById('preview').innerHTML = '';
        }
        
        function sendMessage() {
            const inputField = document.getElementById('user-input');
            const message = inputField.value.trim() || 'Vazhdo'; // Vlera e paracaktuar 'Vazhdo'
            
            inputField.value = '';

            if (currentLessonIndex >= lessons.length) {
                currentLessonIndex = 0; 
            }
            
            displayLesson(currentLessonIndex, message);

            currentLessonIndex++;
        }

        window.onload = function() {
            displayLesson(currentLessonIndex); 
            currentLessonIndex++;

            document.getElementById('send-button').addEventListener('click', sendMessage);
            
            document.getElementById('user-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault(); 
                    sendMessage();
                }
            });

            document.getElementById('home-link').addEventListener('click', function(e) {
                e.preventDefault();
                resetCourse();
            });
        };
    </script>
