    <script>
        // Ruaj numrin aktual të leksionit në nivel global
        window.currentLesson = 1;

        const LESSONS = [
            // Leksioni 1: Variablat (const, let)
            {
                title: "1. Variablat (const, let)",
                explanation: `
                    <p>Në JavaScript, <code class="font-mono">variablat</code> janë thjesht emra që i caktojmë hapësirave të kujtesës për të ruajtur të dhëna. Mendoni sikur janë "kutia" me etiketa ku vendosni informacione. Këto informacione mund të ndryshojnë (variojnë) gjatë ekzekutimit të programit tuaj.</p>
                    <h3 class="text-xl font-semibold mb-2">Përdorimi i const dhe let</h3>
                    <div class="p-4 rounded-lg border border-purple-500 bg-purple-900 bg-opacity-20">
                        <h4 class="text-lg font-bold text-purple-300 mb-2"><code class="font-bold text-xl">let</code> (Variabël e Ndryshueshme)</h4>
                        <p>Përdoret kur vlera pritet të ndryshojë.</p>
                    </div>
                    <div class="p-4 rounded-lg border border-teal-500 bg-teal-900 bg-opacity-20">
                        <h4 class="text-lg font-bold text-teal-300 mb-2"><code class="font-bold text-xl">const</code> (Konstante)</h4>
                        <p>Përdoret kur vlera nuk do të ndryshojë kurrë (p.sh., vlera e PI-së ose një emër qyteti).</p>
                    </div>
                `,
                code: `// Deklaroni një variabël 'emri' me let dhe ndryshojeni.
let emri = "Agnesa";
console.log("Emri fillestar:", emri);

emri = "Arbëri";
console.log("Emri i ndryshuar:", emri);

// Deklaroni një konstante 'ditelindja' me const.
const ditelindja = "01/01/2000";
console.log("Ditëlindja:", ditelindja);

// Provoni të ndryshoni ditelindja nëse dëshironi të shihni gabimin:
// ditelindja = "02/02/2000"; 
// console.log("Ditëlindja e ndryshuar:", ditelindja);
`,
                instructions: "Deklaroni variabla duke përdorur <code class=\"font-mono\">let</code> dhe <code class=\"font-mono\">const</code> dhe shih rezultatin në konsolë."
            },

            // Leksioni 2: Llojet e të Dhënave Primitivë
            {
                title: "2. Llojet e të Dhënave Primitivë",
                explanation: `
                    <p>Llojet e të dhënave primitive janë blloqet themelore të informacionit. JavaScript ka disa tipe kryesore:</p>
                    <ul class="list-disc ml-6 space-y-3">
                        <li><code class="font-mono">String</code>: Për të ruajtur tekst. Përdor thonjëzat.</li>
                        <li><code class="font-mono">Number</code>: Për numra të plotë dhe me presje.</li>
                        <li><code class="font-mono">Boolean</code>: Vetëm <code class="font-mono">true</code> ose <code class="font-mono">false</code>.</li>
                        <li><code class="font-mono">Undefined</code>: Kur një variabël deklarohet pa vlerë.</li>
                        <li><code class="font-mono">Null</code>: Vlerë e caktuar me qëllim që do të thotë "pa vlerë".</li>
                    </ul>
                    <p class="pt-4 border-t border-gray-600 text-sm italic">Përdorni operatorin <code class="font-mono">typeof</code> për të kontrolluar llojin.</p>
                `,
                code: `// 1. String
const qyteti = "Tiranë";
console.log("Qyteti:", typeof qyteti);

// 2. Number
const temperatura = 30.5;
console.log("Temperatura:", typeof temperatura);

// 3. Boolean
let eshteEvertete = true;
console.log("Boolean:", typeof eshteEvertete);

// 4. Undefined
let kodiPostal;
console.log("Kodi Postal (i padeklaruar):", typeof kodiPostal);
`,
                instructions: "Përdorni <code class=\"font-mono\">console.log()</code> dhe <code class=\"font-mono\">typeof</code> për të zbuluar llojet e variablave."
            },

            // Leksioni 3: Operatorët
            {
                title: "3. Operatorët",
                explanation: `
                    <p>Operatorët janë simbole që përdoren për të kryer operacione mbi vlera dhe variabla. Këtu janë disa lloje themelore:</p>
                    <ul class="list-disc ml-6 space-y-3">
                        <li><code class="font-mono">+ - * /</code>: Operatorë Aritmetikë.</li>
                        <li><code class="font-mono">== === != !==</code>: Operatorë Krahasues.</li>
                        <li><code class="font-mono">&& || !</code>: Operatorë Logjikë.</li>
                    </ul>
                    <p class="pt-4 border-t border-gray-600 text-sm italic">Kujdes: <code class="font-mono">==</code> krahason vlerën, ndërsa <code class="font-mono">===</code> krahason vlerën DHE llojin.</p>
                `,
                code: `let a = 10;
let b = 5;

// Aritmetikë
console.log("Shuma:", a + b); // 15
console.log("Mbetja:", a % b); // 0

// Krahasim
console.log("A është a më e madhe se b?", a > b); // true

// Krahasim me tipe
console.log("10 == '10':", 10 == '10'); // true
console.log("10 === '10':", 10 === '10'); // false (tipi ndryshon)
`,
                instructions: "Eksperimentoni me operatorët <code class=\"font-mono\">+</code>, <code class=\"font-mono\">-</code>, <code class=\"font-mono\">*</code>, <code class=\"font-mono\">/</code> dhe <code class=\"font-mono\">%</code>."
            },

            // Leksioni 4: Struktura e Kontrollit: if/else
            {
                title: "4. Struktura e Kontrollit: if/else",
                explanation: `
                    <p>Kjo strukturë i lejon kodit tuaj të marrë vendime, duke ekzekutuar blloqe të ndryshme kodi bazuar në një kusht (boolean).</p>
                    <p>Sintaksa bazë është: <code class="font-mono">if (kushti) { ... } else { ... }</code>.</p>
                    <p>Mund të përdorni gjithashtu <code class="font-mono">else if</code> për të shtuar kushte shtesë.</p>
                `,
                code: `let nota = 75;

if (nota >= 90) {
  console.log("Ekselent!");
} else if (nota >= 70) {
  console.log("Shumë mirë.");
} else if (nota >= 50) {
  console.log("Mjaftueshëm.");
} else {
  console.log("Nuk kaloi klasën.");
}
`,
                instructions: "Ndryshoni vlerën e variablës <code class=\"font-mono\">nota</code> dhe shihni si ndryshon rezultati."
            },

            // Leksioni 5: Struktura e Kontrollit: switch
            {
                title: "5. Struktura e Kontrollit: switch",
                explanation: `
                    <p>Përdoret si një alternativë ndaj shumë <code class="font-mono">if...else if</code> kur po krahasoni një variabël të vetme me shumë vlera të mundshme (cases).</p>
                    <p>Çdo <code class="font-mono">case</code> duhet të përfundojë me <code class="font-mono">break</code>. Nëse asnjë case nuk përputhet, ekzekutohet bloku <code class="font-mono">default</code>.</p>
                `,
                code: `let dita = "E Hënë";
let mesazhi;

switch (dita) {
  case "E Hënë":
    mesazhi = "Fillim i javës, punë të mbarë!";
    break;
  case "E Premte":
    mesazhi = "Fundjava po vjen!";
    break;
  default:
    mesazhi = "Një ditë normale e javës.";
}

console.log(mesazhi);
`,
                instructions: "Ndryshoni vlerën e variablës <code class=\"font-mono\">dita</code> (p.sh., 'E Premte') dhe testoni."
            },

            // Leksioni 6: for Loops (Ciklet)
            {
                title: "6. for Loops (Ciklet)",
                explanation: `
                    <p>Ciklet <code class="font-mono">for</code> përdoren për të përsëritur një bllok kodi një numër të caktuar herësh. Ato kanë tre pjesë kryesore:</p>
                    <ol class="list-decimal ml-6 space-y-1">
                        <li>Inicializimi: <code class="font-mono">let i = 0</code></li>
                        <li>Kushti: <code class="font-mono">i < 5</code> (vazhdon deri sa të jetë e vërtetë)</li>
                        <li>Përditësimi: <code class="font-mono">i++</code> (rritet i me 1)</li>
                    </ol>
                `,
                code: `// Cikël që numëron nga 1 në 5
for (let i = 1; i <= 5; i++) {
  console.log("Numri:", i);
}
`,
                instructions: "Krijoni një cikël <code class=\"font-mono\">for</code> që numëron nga 10 prapa deri në 1."
            },
            
            // Leksioni 7: while dhe do...while Loops
            {
                title: "7. while dhe do...while Loops",
                explanation: `
                    <p>Cikli <code class="font-mono">while</code> ekzekutohet për sa kohë që kushti i caktuar mbetet i vërtetë. Kontrolli i kushtit bëhet *para* ekzekutimit të bllokut të kodit.</p>
                    <p>Cikli <code class="font-mono">do...while</code> ekzekutohet *të paktën një herë*, sepse kushti kontrollohet *pas* ekzekutimit të bllokut të kodit.</p>
                `,
                code: `let numri = 0;

// Cikli while
while (numri < 3) {
  console.log("While:", numri);
  numri++;
}

let x = 5;
// Cikli do...while (ekzekutohet një herë edhe pse x nuk është < 5)
do {
  console.log("Do...While:", x);
  x++;
} while (x < 5);
`,
                instructions: "Krijoni një cikël <code class=\"font-mono\">while</code> që ndalon kur një variabël arrin vlerën 7."
            },
            
            // Leksioni 8: Funksionet (Deklarimi)
            {
                title: "8. Funksionet (Deklarimi)",
                explanation: `
                    <p>Funksionet janë blloqe kodi të ripërdorshëm që kryejnë një detyrë të caktuar. Deklarohen duke përdorur fjalën kyçe <code class="font-mono">function</code>.</p>
                    <p>Përdorimi i funksioneve ndihmon në organizimin e kodit dhe shmang përsëritjen.</p>
                `,
                code: `// Deklarimi i funksionit
function pershendetje() {
  console.log("Përshëndetje nga funksioni!");
}

// Thirrja (ekzekutimi) i funksionit
pershendetje();
pershendetje();
`,
                instructions: "Krijoni funksionin tuaj <code class=\"font-mono\">sqaro()</code> dhe thirreni dy herë."
            },
            
            // Leksioni 9: Funksionet (Parametrat dhe Return)
            {
                title: "9. Funksionet (Parametrat dhe Return)",
                explanation: `
                    <p>Funksionet mund të pranojnë të dhëna hyrëse përmes **Parametrave** dhe mund të kthejnë një vlerë dalëse duke përdorur fjalën kyçe <code class="font-mono">return</code>.</p>
                    <p>Parametrat janë variabla të deklaruara brenda kllapave <code class="font-mono">()</code>.</p>
                `,
                code: `function shuma(a, b) {
  // Funksioni kthen rezultatin e mbledhjes
  return a + b;
}

// Thirrja e funksionit me argumentet 5 dhe 3

console.log("Rezultati i shumës:", rezultati); // 8
`,
                instructions: "Krijoni një funksion që merr dy numra, i shumëzon dhe e kthen rezultatin."
            },
            
            // Leksioni 10: Sferat (Scope) e Variablave
            {
                title: "10. Sferat (Scope) e Variablave",
                explanation: `
                    <p>Scope (Sfera) përcakton se ku janë të aksesueshme variablat në kodin tuaj. Kemi dy lloje kryesore:</p>
                    <ul class="list-disc ml-6 space-y-1">
                        <li>**Global Scope:** Variablat e deklaruara jashtë funksioneve/blloqeve.</li>
                        <li>**Block Scope:** Variablat e deklaruara me <code class="font-mono">let</code> ose <code class="font-mono">const</code> brenda blloqeve <code class="font-mono">{}</code> (p.sh., if, for).</li>
                    </ul>
                    <p class="pt-4 border-t border-gray-600 text-sm italic">Variablat brenda një funksioni nuk mund të aksesohen jashtë tij.</p>
                `,
                code: `const globalVar = "Unë jam global";

function shfaqScope() {
  const localVal = "Unë jam lokal";
  console.log(globalVar); // Mund të aksesohet
}

shfaqScope();
// console.log(localVal); // Gabim! Nuk mund të aksesohet jashtë funksionit
`,
                instructions: "Krijoni një bllok <code class=\"font-mono\">if</code> dhe shihni cilat variabla mund të aksesohen brenda tij."
            },
            
            // Leksioni 11: Array (Vektorët)
            {
                title: "11. Array (Vektorët)",
                explanation: `
                    <p>Një Array (Vektor) është një strukturë e renditur e të dhënave që mund të mbajë vlera të shumëfishta në një variabël të vetme. Vlerat (elementet) aksesohen duke përdorur një indeks numerik, duke filluar nga 0.</p>
                `,
                code: `const fruta = ["Molla", "Banana", "Portokalli"];

// Aksesimi i elementit të parë (indeksi 0)

`,
                instructions: "Krijoni një Array me tre numra dhe aksesoni elementin e dytë."
            },
            
            // Leksioni 12: Metodat Kryesore të Array-t
            {
                title: "12. Metodat Kryesore të Array-t",
                explanation: `
                    <p>Array-të vijnë me funksione të ndërtuara (metoda) për manipulim të lehtë:</p>
                    <ul class="list-disc ml-6 space-y-1">
                        <li><code class="font-mono">push()</code>: Shton një element në fund.</li>

                        <li><code class="font-mono">length</code>: Pronë që tregon numrin e elementeve.</li>

console.log("U hoq:", fundi);
console.log("Pas pop():", lista);
`,

            },

                    <p>Përdoren për të modeluar entitete të botës reale si njerëz, makina, ose vende.</p>
                `,
                code: `const personi = {

`,

            },

        function loadLesson(lessonNum) {
            if (lessonNum < 1 || lessonNum > LESSONS.length) {
                return; 
            }

            window.currentLesson = lessonNum; 
            const lessonIndex = lessonNum - 1;
            const lessonData = LESSONS[lessonIndex];

            document.getElementById('page-title').textContent = `Kursi i JavaScript: ${lessonData.title}`;
            document.getElementById('lesson-title-display').innerHTML = lessonData.title;

            document.getElementById('lesson-content').innerHTML = lessonData.explanation;

            document.getElementById('code-editor').value = lessonData.code.trim();
            document.getElementById('editor-instructions').innerHTML = lessonData.instructions;
            document.getElementById('output').textContent = "Kliko 'Ekzekuto Kodin' për të parë rezultatin e skriptit tuaj këtu.";
            document.getElementById('output').classList.remove('error');

            updateNavigationButtons(lessonNum);
        }

        
        function updateNavigationButtons(current) {
            const totalLessons = LESSONS.length;
            const prevBtn = document.getElementById('prev-lesson-btn');
            const nextBtn = document.getElementById('next-lesson-btn');
            const progressText = document.getElementById('progress-text');
            const progressBar = document.getElementById('progress-bar');
            
            prevBtn.disabled = (current === 1);
            nextBtn.disabled = (current === totalLessons);

            progressText.textContent = `${current} / ${totalLessons}`;

            const progressPercentage = (current / totalLessons) * 100;
            progressBar.style.width = `${progressPercentage}%`;
        }

        
        function runCode() {
            const code = document.getElementById('code-editor').value;
            const outputElement = document.getElementById('output');
            
            outputElement.textContent = 'Duke ekzekutuar...';
            outputElement.classList.remove('error');
            
            let capturedOutput = '';
            
            const customConsole = {
                log: (...args) => {
                    const message = args.map(a => 
                        typeof a === 'object' && a !== null ? JSON.stringify(a, null, 2) : String(a)
                    ).join(' ');
                    capturedOutput += message + '\n';
                },
                error: (...args) => {
                    const message = args.map(a => 
                        typeof a === 'object' && a !== null ? JSON.stringify(a, null, 2) : String(a)
                    ).join(' ');
                    capturedOutput += `[ERROR] ${message}\n`;
                }
            };

            try {
                const executableFunction = new Function('console', 'localStorage', code);
                executableFunction(customConsole, window.localStorage);
                
                if (capturedOutput.trim() === '') {
                    outputElement.textContent = 'Kodi u ekzekutua me sukses. Asnjë rezultat i dukshëm duke përdorur console.log().';
                } else {
                    outputElement.textContent = capturedOutput.trim();
                }

            } catch (e) {
                outputElement.textContent = `🚨 Gabim Gjatë Ekzekutimit:\n\n${e.message}\n\n--- Rezultati para gabimit ---\n${capturedOutput}`;
                outputElement.classList.add('error');
            }
        }

        window.onload = function() {
            loadLesson(window.currentLesson);
        };
    </script>
</body>
</html>
